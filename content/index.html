<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Andrea Verlicchi</title>
  <script>
    const userLang = navigator.language || navigator.userLanguage;
    if (userLang && userLang.toLowerCase().startsWith('it')) {
      window.location.replace('/it/');
    } else {
      window.location.replace('/en/');
    }
  </script>
  <meta http-equiv="refresh" content="0; url=/en/">
  <link rel="canonical" href="https://andreaverlicchi.eu/en/">
</head>
<body>
  <p>Redirecting... / Reindirizzamento in corso...</p>
  <ul>
    <li><a href="/en/">English version</a></li>
    <li><a href="/it/">Versione italiana</a></li>
  </ul>
</body>
</html>
